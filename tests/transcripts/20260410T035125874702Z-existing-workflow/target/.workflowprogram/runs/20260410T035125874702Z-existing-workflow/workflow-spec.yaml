meta:
  name: valid-minimal-workflow
  version: 1.0.0
  target_platform: claude_code
  source_design: workflow-design.md
  complexity: M
stages:
- id: requirement
  stage_slot: S1
  name: 需求澄清
  pattern: Explore
  agent_ref: requirement_analyst
  input: $ARGUMENTS
  output: workflow-spec.md
  gate: user_approval
  max_retries: 3
  on_approve: context
  on_reject: abort
- id: context
  stage_slot: S2
  name: 领域研究
  pattern: Explore
  agent_ref: requirement_analyst
  input: workflow-spec.md
  output: outputs/stages/s2-context-report.md
  max_retries: 3
- id: design
  stage_slot: S3
  name: 工作流设计
  pattern: Specialized
  agent_ref: workflow_designer
  input: outputs/stages/s2-context-report.md
  output: 'workflow-design.md

    workflow-spec.yaml

    workflow-view.md

    '
  gate: user_approval
  auto_approve_cond: --auto-approve or CI=true
  max_retries: 3
  on_approve: generate
  on_reject: requirement
- id: generate
  stage_slot: S4
  name: 文件生成
  pattern: Sequential
  steps:
  - action: generate_agents
    from_yaml: agents
  - action: generate_skills
    from_yaml: skills
  - action: generate_commands
    from_yaml: commands
  - action: update_settings
    from_yaml: registry
  output: 'outputs/candidate/.claude

    outputs/managed-change-plan.json

    outputs/managed-change-result.json

    .claude/agents/*.md

    .claude/skills/*/SKILL.md

    .claude/commands/*.md

    .claude/settings.json

    '
- id: validate
  stage_slot: S5
  name: 运行时验证
  pattern: Test-Driven
  agent_ref: workflowprogram-validate
  input: outputs/managed-change-result.json
  resources:
    max_turn_count: 100
    circuit_breaker:
      trigger: PostToolUseFailure
      threshold: 3
  max_retries: 3
  output: 'validation-runtime-report.md

    outputs/stages/s5-validation-summary.json

    '
  feedback:
    on_fail_design: design
    on_fail_impl: generate
- id: lessons
  stage_slot: S6
  name: 约束演进
  pattern: Sequential
  actions:
  - extract_lessons
  - update_constraints
  output: 'outputs/stages/s6-lessons-delta.md

    .claude/rules/constraints.md

    '
intent_flows:
  develop:
    required_stage_slots:
    - S1
    - S2
    - S3
    - S4
    - S5
    - S6
    optional_stage_slots: []
  audit:
    required_stage_slots:
    - S5
    - S6
    optional_stage_slots: []
  iterate:
    required_stage_slots:
    - S6
    optional_stage_slots:
    - S5
  validate:
    required_stage_slots:
    - S5
    optional_stage_slots:
    - S6
agent_refs:
- requirement_analyst
- workflow_designer
- workflowprogram-validate
- security-reviewer
- performance-reviewer
- style-reviewer
- logic-reviewer
skills:
- name: validate-file
  internal: true
- name: validate-settings
  internal: true
registry:
  commands:
  - name: example
    file: .claude/commands/example.md
  skills:
  - name: example-skill
    file: .claude/skills/example/SKILL.md
constraints:
  always:
  - '为用户可见命令保留 ## Usage 段'
  - 将命令组织为编号阶段，提供 Goal 与 Verify
  - 子代理提示词内联，不依赖外部文件
  never:
  - 在单个 fan-out 阶段中超过 4 个并行代理
  - 让子代理运行时依赖外部 agent 文件
  - 在未经验证的情况下声明工作流创建完成
resource_limits:
  max_parallel_agents: 4
  max_retries_per_stage: 3
  max_validation_loops: 10
runtime_contract:
  write_boundaries:
    target_root_allow:
    - .claude/**
    - .workflowprogram/**
    - validation-report.md
    run_root_allow:
    - context.json
    - state.json
    - events.jsonl
    - workflow-spec.yaml
    - workflow-*.md
    - workflow-view.md
    - transcript.md
    - validation-runtime-report.md
    - outputs/**
    temp_root_allow:
    - '**'
    deny:
    - '**/.git/**'
    - '**/node_modules/**'
  required_evidence:
  - context.json
  - state.json
  - events.jsonl
  - outputs/progress/current-progress.json
  - outputs/progress/milestones.jsonl
  - outputs/progress/user-progress.md
  - outputs/stages/s0-route.json
  - outputs/stages/runner-summary.json
  failure_kinds:
  - none
  - design
  - implementation
  - environment
  - conflict
  environment_skip:
  - code: RUNTIME_HOST_MISSING
    check: runtime_host_available
    message: 运行宿主不可用，跳过运行态验证
  - code: TARGET_NOT_WRITABLE
    check: target_root_writable
    message: TARGET_ROOT 无写权限，跳过运行态验证
  - code: RUNTIME_HOST_NOT_READY
    check: runtime_host_ready
    message: 运行宿主未就绪，跳过运行态验证
test_contract:
  entry:
    main_entry: workflowprogram-iterate
    entry_type: slash_command
    required_args:
    - $ARGUMENTS
    missing_arg_verdict: FAIL
    invalid_entry_verdict: FAIL
  boundary:
    write_boundaries_ref: runtime_contract.write_boundaries
    managed_overwrite_policy: reject-unmanaged-overwrite
    conflict_expectation: keep-candidate-and-report
    external_write_policy: deny
  flow:
    required_stages:
    - requirement
    - context
    - design
    - generate
    - validate
    - lessons
    skippable_stages: []
    failure_recovery:
      design: design
      implementation: generate
    terminal_conditions:
      PASS: done
      WARN: blocked
      FAIL: failed
      ENVIRONMENT-SKIP: done
  artifacts:
    deliverables:
    - validation-report.md
    evidence_ref: runtime_contract.required_evidence
    optional_outputs:
    - .claude/commands/*.md
  failure:
    failure_kinds_ref: runtime_contract.failure_kinds
    environment_skip_ref: runtime_contract.environment_skip
    implemented_now:
    - none
    - environment
